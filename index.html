<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ──────────────────────────────────────── */
    :root {
      --cream:    #f5f0e8;
      --paper:    #faf7f2;
      --ink:      #1c1a17;
      --ink2:     #3d3a35;
      --muted:    #8c8479;
      --rule:     #ddd8ce;
      --alta:     #c0392b;
      --alta-bg:  #fdecea;
      --media:    #d4820a;
      --media-bg: #fef3e2;
      --baixa:    #2e7d32;
      --baixa-bg: #eaf4eb;
      --done:     #6b6560;
      --done-bg:  #f0ece6;
      --accent:   #c0392b;
      --shadow:   0 2px 12px rgba(28,26,23,.08);
      --r:        10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Instrument Sans', sans-serif;
      min-height: 100vh;
      /* subtle lined paper texture */
      background-image: repeating-linear-gradient(
        transparent, transparent 27px,
        rgba(180,170,155,.18) 27px, rgba(180,170,155,.18) 28px
      );
    }

    /* ── HEADER ──────────────────────────────────────── */
    header {
      background: var(--ink);
      color: var(--cream);
      padding: 2rem 2.5rem 1.6rem;
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
    }

    .logo span {
      color: transparent;
      -webkit-text-stroke: 1.5px var(--cream);
    }

    .header-meta {
      text-align: right;
    }

    .header-date {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .3rem;
    }

    .header-count {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    /* ── LAYOUT ──────────────────────────────────────── */
    .layout {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 780px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── FORM CARD ───────────────────────────────────── */
    .form-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-top: 4px solid var(--ink);
      border-radius: var(--r);
      padding: 1.75rem;
      box-shadow: var(--shadow);
      position: sticky; top: 1.5rem;
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .6rem;
    }

    .mode-pill {
      display: inline-block;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 999px;
      background: var(--ink);
      color: var(--cream);
    }

    .mode-pill.edit {
      background: var(--media);
      color: #fff;
    }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    .fg { margin-bottom: .9rem; }

    input[type=text], textarea, select {
      width: 100%;
      background: var(--cream);
      border: 1px solid var(--rule);
      border-radius: 6px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      padding: .65rem .85rem;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      resize: none;
    }

    input[type=text]:focus, textarea:focus, select:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(28,26,23,.08);
    }

    textarea { min-height: 72px; }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select option { background: var(--paper); }

    /* prioridade radio group */
    .pri-group {
      display: flex; gap: .5rem;
      margin-bottom: .9rem;
    }

    .pri-option { flex: 1; }

    .pri-option input { display: none; }

    .pri-option label {
      display: flex; align-items: center; justify-content: center;
      gap: .3rem;
      padding: .55rem .4rem;
      border-radius: 6px;
      border: 1.5px solid var(--rule);
      cursor: pointer;
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      transition: all .15s;
      background: var(--cream);
    }

    .pri-option input:checked + label.alta  { background: var(--alta-bg);  color: var(--alta);  border-color: var(--alta); }
    .pri-option input:checked + label.media { background: var(--media-bg); color: var(--media); border-color: var(--media); }
    .pri-option input:checked + label.baixa { background: var(--baixa-bg); color: var(--baixa); border-color: var(--baixa); }

    .pri-option label:hover { border-color: var(--ink2); color: var(--ink2); }

    /* buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .45rem;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .9rem; font-weight: 600;
      border: none; cursor: pointer;
      border-radius: 7px;
      padding: .72rem 1.1rem;
      transition: all .15s;
      width: 100%;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--cream);
      margin-bottom: .5rem;
    }
    .btn-primary:hover { background: var(--ink2); transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--rule);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--ink); }

    /* ── RIGHT COLUMN ────────────────────────────────── */
    .right { display: flex; flex-direction: column; gap: 1.25rem; }

    /* search + filter bar */
    .toolbar {
      display: flex; gap: .75rem; flex-wrap: wrap;
    }

    .search-wrap {
      position: relative; flex: 1; min-width: 180px;
    }

    .search-wrap input {
      padding-left: 2.2rem;
      background: var(--paper);
      border: 1px solid var(--rule);
    }

    .search-icon {
      position: absolute; left: .75rem; top: 50%;
      transform: translateY(-50%);
      font-size: .85rem; color: var(--muted);
      pointer-events: none;
    }

    .filter-select {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 6px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .88rem;
      color: var(--ink);
      padding: .65rem .85rem;
      outline: none;
      cursor: pointer;
    }

    /* stats strip */
    .stats-strip {
      display: flex; gap: .75rem; flex-wrap: wrap;
    }

    .stat {
      flex: 1; min-width: 90px;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: var(--r);
      padding: .9rem 1rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem; font-weight: 900;
      line-height: 1;
    }

    .stat-lbl {
      font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); margin-top: .25rem;
    }

    .stat.s-pend .stat-num  { color: var(--ink); }
    .stat.s-prog .stat-num  { color: var(--media); }
    .stat.s-done .stat-num  { color: var(--baixa); }
    .stat.s-alta .stat-num  { color: var(--alta); }

    /* ── TASK LIST ───────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: .65rem; }

    .task-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-left: 4px solid var(--rule);
      border-radius: var(--r);
      padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      animation: cardIn .28s ease both;
      transition: box-shadow .15s;
    }

    .task-card:hover { box-shadow: 0 4px 20px rgba(28,26,23,.12); }

    .task-card.pri-alta  { border-left-color: var(--alta); }
    .task-card.pri-media { border-left-color: var(--media); }
    .task-card.pri-baixa { border-left-color: var(--baixa); }
    .task-card.concluida { opacity: .65; border-left-color: var(--done); }
    .task-card.concluida .task-title { text-decoration: line-through; color: var(--muted); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-left { display: flex; flex-direction: column; gap: .4rem; }

    .task-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      color: var(--ink); line-height: 1.3;
    }

    .task-desc {
      font-size: .85rem; color: var(--muted); font-weight: 300;
      line-height: 1.5;
    }

    .task-meta {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
      margin-top: .25rem;
    }

    .chip {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      padding: .2rem .6rem;
      border-radius: 999px;
    }

    .chip-alta  { background: var(--alta-bg);  color: var(--alta); }
    .chip-media { background: var(--media-bg); color: var(--media); }
    .chip-baixa { background: var(--baixa-bg); color: var(--baixa); }
    .chip-done  { background: var(--done-bg);  color: var(--done); }

    .chip-status {
      font-size: .7rem; font-weight: 500;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 999px;
      padding: .18rem .55rem;
    }

    .chip-status.andando { color: var(--media); border-color: var(--media); background: var(--media-bg); }
    .chip-status.concluida { color: var(--baixa); border-color: var(--baixa); background: var(--baixa-bg); }

    /* actions */
    .task-actions {
      display: flex; flex-direction: column;
      align-items: flex-end;
      gap: .35rem;
      padding-top: .15rem;
    }

    .act-btn {
      background: transparent;
      border: 1px solid var(--rule);
      color: var(--muted);
      font-family: 'Instrument Sans', sans-serif;
      font-size: .75rem; font-weight: 500;
      padding: .3rem .6rem;
      border-radius: 5px;
      cursor: pointer;
      transition: all .14s;
      white-space: nowrap;
    }

    .act-btn:hover       { border-color: var(--ink); color: var(--ink); }
    .act-btn.del:hover   { border-color: var(--alta); color: var(--alta); }
    .act-btn.check:hover { border-color: var(--baixa); color: var(--baixa); background: var(--baixa-bg); }

    /* select status inline */
    .status-select {
      background: var(--cream);
      border: 1px solid var(--rule);
      border-radius: 5px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: .75rem;
      color: var(--ink);
      padding: .28rem .5rem;
      outline: none;
      cursor: pointer;
    }

    /* empty */
    .empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
      border: 1.5px dashed var(--rule);
      border-radius: var(--r);
      background: var(--paper);
    }

    .empty-icon { font-size: 2.8rem; margin-bottom: .6rem; opacity: .5; }
    .empty p { font-size: .95rem; font-weight: 300; }

    /* ── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--ink); color: var(--cream);
      border-radius: 8px;
      padding: .8rem 1.2rem;
      font-size: .88rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(28,26,23,.25);
      transform: translateY(120%);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999;
      max-width: 300px;
    }

    #toast.show { transform: translateY(0); }
    #toast.ok   { background: var(--baixa); }
    #toast.err  { background: var(--alta); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Task<span>board</span></div>
  <div class="header-meta">
    <div class="header-date" id="hDate"></div>
    <div class="header-count"><span id="hCount">0</span> tarefas</div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- FORM -->
  <aside class="form-card">
    <h2>
      Nova tarefa
      <span class="mode-pill" id="modePill">Criar</span>
    </h2>

    <div class="fg">
      <label>Título</label>
      <input id="fTitulo" type="text" placeholder="O que precisa ser feito?"/>
    </div>

    <div class="fg">
      <label>Descrição (opcional)</label>
      <textarea id="fDesc" placeholder="Mais detalhes..."></textarea>
    </div>

    <div class="fg">
      <label>Prioridade</label>
      <div class="pri-group">
        <div class="pri-option">
          <input type="radio" name="pri" id="pAlta" value="alta"/>
          <label for="pAlta" class="alta">🔴 Alta</label>
        </div>
        <div class="pri-option">
          <input type="radio" name="pri" id="pMedia" value="media" checked/>
          <label for="pMedia" class="media">🟡 Média</label>
        </div>
        <div class="pri-option">
          <input type="radio" name="pri" id="pBaixa" value="baixa"/>
          <label for="pBaixa" class="baixa">🟢 Baixa</label>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="salvar()">💾 Salvar Tarefa</button>
    <button class="btn btn-ghost" id="btnCancelar" onclick="cancelar()" style="display:none">✕ Cancelar edição</button>
  </aside>

  <!-- RIGHT -->
  <div class="right">

    <!-- STATS -->
    <div class="stats-strip">
      <div class="stat s-pend"><div class="stat-num" id="stPend">0</div><div class="stat-lbl">Pendentes</div></div>
      <div class="stat s-prog"><div class="stat-num" id="stProg">0</div><div class="stat-lbl">Andamento</div></div>
      <div class="stat s-done"><div class="stat-num" id="stDone">0</div><div class="stat-lbl">Concluídas</div></div>
      <div class="stat s-alta"><div class="stat-num" id="stAlta">0</div><div class="stat-lbl">Alta Prior.</div></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="text" placeholder="Buscar tarefas..." oninput="render()"/>
      </div>
      <select class="filter-select" id="filterStatus" onchange="render()">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="em andamento">Em andamento</option>
        <option value="concluída">Concluída</option>
      </select>
      <select class="filter-select" id="filterPri" onchange="render()">
        <option value="">Todas prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
      </select>
    </div>

    <!-- LIST -->
    <div class="task-list" id="taskList"></div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ── Estado ─────────────────────────────────────────────────
  let tarefas = [];
  let editId  = null;

  // ── Data no header ─────────────────────────────────────────
  document.getElementById("hDate").textContent =
    new Date().toLocaleDateString("pt-BR", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

  // ── API ────────────────────────────────────────────────────
  const API = "/tarefas";

  async function req(url, opts = {}) {
    const r = await fetch(url, { headers: { "Content-Type": "application/json" }, ...opts });
    const d = await r.json();
    if (!r.ok) throw new Error(d.erro || "Erro");
    return d;
  }

  // ── Carregar ───────────────────────────────────────────────
  async function carregar() {
    tarefas = await req(API);
    render(); stats();
  }

  // ── Salvar (create ou update) ──────────────────────────────
  async function salvar() {
    const titulo     = document.getElementById("fTitulo").value.trim();
    const descricao  = document.getElementById("fDesc").value.trim();
    const prioridade = document.querySelector('input[name="pri"]:checked')?.value;

    if (!titulo)     return toast("⚠️ Título obrigatório.", "err");
    if (!prioridade) return toast("⚠️ Selecione uma prioridade.", "err");

    try {
      if (editId !== null) {
        const up = await req(`${API}/${editId}`, {
          method: "PUT",
          body: JSON.stringify({ titulo, descricao, prioridade }),
        });
        tarefas = tarefas.map((t) => t.id === editId ? up : t);
        toast("✏️ Tarefa atualizada!", "ok");
        cancelar();
      } else {
        const nova = await req(API, {
          method: "POST",
          body: JSON.stringify({ titulo, descricao, prioridade }),
        });
        tarefas.push(nova);
        toast("✅ Tarefa criada!", "ok");
        limpar();
      }
      render(); stats();
    } catch (e) {
      toast("❌ " + e.message, "err");
    }
  }

  // ── Alterar status ─────────────────────────────────────────
  async function alterarStatus(id, status) {
    try {
      const up = await req(`${API}/${id}`, { method: "PUT", body: JSON.stringify({ status }) });
      tarefas = tarefas.map((t) => t.id === id ? up : t);
      render(); stats();
    } catch (e) { toast("❌ " + e.message, "err"); }
  }

  // ── Deletar ────────────────────────────────────────────────
  async function deletar(id) {
    if (!confirm("Remover esta tarefa?")) return;
    try {
      await req(`${API}/${id}`, { method: "DELETE" });
      tarefas = tarefas.filter((t) => t.id !== id);
      render(); stats();
      toast("🗑️ Removida.", "ok");
    } catch (e) { toast("❌ " + e.message, "err"); }
  }

  // ── Editar ─────────────────────────────────────────────────
  function editar(id) {
    const t = tarefas.find((t) => t.id === id);
    if (!t) return;
    editId = id;
    document.getElementById("fTitulo").value = t.titulo;
    document.getElementById("fDesc").value   = t.descricao;
    const radio = document.querySelector(`input[name="pri"][value="${t.prioridade}"]`);
    if (radio) radio.checked = true;

    document.getElementById("modePill").textContent = "Editando";
    document.getElementById("modePill").classList.add("edit");
    document.getElementById("btnCancelar").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function cancelar() {
    editId = null; limpar();
    document.getElementById("modePill").textContent = "Criar";
    document.getElementById("modePill").classList.remove("edit");
    document.getElementById("btnCancelar").style.display = "none";
  }

  function limpar() {
    document.getElementById("fTitulo").value = "";
    document.getElementById("fDesc").value   = "";
    document.getElementById("pMedia").checked = true;
  }

  // ── Render ─────────────────────────────────────────────────
  function chipPri(p) {
    const map = { alta:"chip-alta", media:"chip-media", baixa:"chip-baixa" };
    const lab = { alta:"🔴 Alta", media:"🟡 Média", baixa:"🟢 Baixa" };
    return `<span class="chip ${map[p]}">${lab[p]}</span>`;
  }

  function chipStatus(s) {
    const cls = s === "em andamento" ? "andando" : s === "concluída" ? "concluida" : "";
    return `<span class="chip-status ${cls}">${s}</span>`;
  }

  function render() {
    const q   = document.getElementById("search").value.toLowerCase();
    const fs  = document.getElementById("filterStatus").value;
    const fp  = document.getElementById("filterPri").value;

    let lista = tarefas.filter((t) => {
      const matchQ  = t.titulo.toLowerCase().includes(q) || t.descricao.toLowerCase().includes(q);
      const matchSt = !fs || t.status === fs;
      const matchPr = !fp || t.prioridade === fp;
      return matchQ && matchSt && matchPr;
    });

    // ordenar: não-concluídas primeiro, depois por prioridade
    const priOrd = { alta: 0, media: 1, baixa: 2 };
    lista.sort((a, b) => {
      if (a.status === "concluída" && b.status !== "concluída") return 1;
      if (b.status === "concluída" && a.status !== "concluída") return -1;
      return priOrd[a.prioridade] - priOrd[b.prioridade];
    });

    document.getElementById("hCount").textContent = tarefas.length;
    const el = document.getElementById("taskList");

    if (lista.length === 0) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>${tarefas.length === 0 ? "Nenhuma tarefa ainda. Crie a primeira!" : "Nenhuma tarefa encontrada."}</p>
        </div>`;
      return;
    }

    el.innerHTML = lista.map((t) => `
      <div class="task-card pri-${t.prioridade} ${t.status === "concluída" ? "concluida" : ""}">
        <div class="task-left">
          <div class="task-title">${t.titulo}</div>
          ${t.descricao ? `<div class="task-desc">${t.descricao}</div>` : ""}
          <div class="task-meta">
            ${chipPri(t.prioridade)}
            ${chipStatus(t.status)}
            <select class="status-select" onchange="alterarStatus(${t.id}, this.value)">
              <option value="pendente"     ${t.status==="pendente"?"selected":""}>Pendente</option>
              <option value="em andamento" ${t.status==="em andamento"?"selected":""}>Em andamento</option>
              <option value="concluída"    ${t.status==="concluída"?"selected":""}>Concluída</option>
            </select>
          </div>
        </div>
        <div class="task-actions">
          <button class="act-btn" onclick="editar(${t.id})">✏️ Editar</button>
          <button class="act-btn del" onclick="deletar(${t.id})">🗑️ Remover</button>
        </div>
      </div>
    `).join("");
  }

  function stats() {
    document.getElementById("stPend").textContent = tarefas.filter((t) => t.status === "pendente").length;
    document.getElementById("stProg").textContent = tarefas.filter((t) => t.status === "em andamento").length;
    document.getElementById("stDone").textContent = tarefas.filter((t) => t.status === "concluída").length;
    document.getElementById("stAlta").textContent = tarefas.filter((t) => t.prioridade === "alta").length;
  }

  // ── Toast ───────────────────────────────────────────────────
  let _tt;
  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove("show"), 3000);
  }

  // ── Init ────────────────────────────────────────────────────
  carregar();
</script>
</body>
</html>
